[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Healthcheck disabled temporarily — Railway edge was marking the service as
# "Application not found" even when /health responded locally. Re-enable once
# the networking issue is diagnosed.
# healthcheckPath = "/health"
# healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
